<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="TripLikeJ"/>
<meta name="theme-color" content="#F5F2EC"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<title>Trip Like J</title>
<!-- Open Graph / 카카오톡·문자 미리보기 -->
<meta property="og:type"        content="website"/>
<meta property="og:url"         content="https://arschooling.github.io/TripLikeJ/"/>
<meta property="og:title"       content="Trip Like J"/>
<meta property="og:description" content="J가 쓰는 여행 일정 앱."/>
<meta property="og:image"       content="https://arschooling.github.io/TripLikeJ/og-image-v2.png"/>
<meta property="og:image:width" content="1200"/>
<meta property="og:image:height"content="630"/>
<meta name="twitter:card"       content="summary_large_image"/>
<!-- 폰트 비차단 로드 -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=block"
  onload="this.onload=null;this.rel='stylesheet'"/>
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=block"/></noscript>
<style>
  @font-face {
    font-family: 'Adam';
    src: url('./adam-light.otf') format('opentype');
    font-weight: 300;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Adam';
    src: url('./adam-medium.otf') format('opentype');
    font-weight: 500;
    font-style: normal;
    font-display: swap;
  }
  html, body { margin:0; padding:0; background:#F5F2EC; overflow-x:hidden; }
  #root { min-height:100%; background:#F5F2EC; }
  * { -webkit-user-select:none; user-select:none; }
  input, textarea { -webkit-user-select:text; user-select:text; }
  @keyframes ptr-spin  { to { transform:rotate(360deg); } }
  @keyframes splashIn  { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  @keyframes destSlide { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  @keyframes barGrow   { 0%{width:0%} 40%{width:55%} 70%{width:75%} 100%{width:88%} }
  @keyframes splashOut { to { opacity:0; } }
  @keyframes charPop {
    0%   { opacity:0; transform:translateY(52px) scale(0.55); }
    55%  { opacity:1; transform:translateY(-13px) scale(1.12); }
    75%  { transform:translateY(5px) scale(0.96); }
    90%  { transform:translateY(-3px) scale(1.02); }
    100% { opacity:1; transform:translateY(0) scale(1); }
  }
  /* 비행기: 천천히 출발 → 가속 → 코 들리며 서서히 멈춤 (사라지지 않음) */
  /* 비행기: 평평(28deg) 출발 → 가속 → 서서히 감속하며 스무스하게 멈춤 */
  @keyframes planeFly {
    0%   { transform:translateX(-310px) translateY(12px) rotate(28deg); }
    15%  { transform:translateX(-265px) translateY(12px) rotate(24deg); }
    32%  { transform:translateX(-185px) translateY(10px) rotate(18deg); }
    50%  { transform:translateX(-75px)  translateY(5px)  rotate(11deg); }
    65%  { transform:translateX(-20px)  translateY(2px)  rotate(5deg); }
    80%  { transform:translateX(-6px)   translateY(0px)  rotate(2deg); }
    90%  { transform:translateX(-2px)   translateY(0px)  rotate(1deg); }
    100% { transform:translateX(0)      translateY(0)    rotate(0deg); }
  }
  /* 땅선: 비행기 착지 후 페이드인 */
  @keyframes planeFadeIn {
    from { opacity:0; }
    to   { opacity:1; }
  }
  /* 활주로: 넓게 펼쳐졌다가 아이콘 크기로 수축 후 사라짐 */
  @keyframes tabSlideFromRight { from { transform:translateX(100%) } to { transform:translateX(0) } }
  @keyframes tabSlideFromLeft  { from { transform:translateX(-100%) } to { transform:translateX(0) } }
  @keyframes runwaySpring {
    0%   { transform:scaleX(19);   }
    36%  { transform:scaleX(0.41); }
    60%  { transform:scaleX(1.13); }
    76%  { transform:scaleX(0.64); }
    89%  { transform:scaleX(0.91); }
    100% { transform:scaleX(1);    }
  }
  .arshooling-text {
    color: #000;
    font-weight: 500;
  }
</style>
<!-- 서비스 워커 등록 + 새 버전 감지 시 자동 새로고침 -->
<script>
var EXPECTED_CACHE = 'tlj-v105';
if('serviceWorker' in navigator) {
  var _reloading = false;
  function _doReload() {
    if (_reloading) return;
    _reloading = true;
    location.reload();
  }
  // 캐시 키가 현재 버전과 다르면 SW 강제 해제 후 리로드
  if ('caches' in window) {
    caches.keys().then(function(keys) {
      if (keys.length && keys.indexOf(EXPECTED_CACHE) === -1) {
        navigator.serviceWorker.getRegistration().then(function(reg) {
          if (reg) reg.unregister().then(function() { _doReload(); });
          else _doReload();
        });
      }
    });
  }
  navigator.serviceWorker.addEventListener('controllerchange', _doReload);
  navigator.serviceWorker.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'SW_UPDATED') _doReload();
  });
  function checkWaiting(r) {
    if (r.waiting) { r.waiting.postMessage({ type: 'SKIP_WAITING' }); }
  }
  navigator.serviceWorker.register('./sw.js').then(function(reg) {
    reg.update();
    checkWaiting(reg);
    reg.addEventListener('updatefound', function() {
      var newSW = reg.installing;
      if (!newSW) return;
      newSW.addEventListener('statechange', function() {
        if (newSW.state === 'installed') checkWaiting(reg);
        if (newSW.state === 'activated') _doReload();
      });
    });
  });
  // 앱이 포그라운드로 올 때마다 업데이트 확인 (iOS PWA 자동 업데이트)
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState !== 'visible') return;
    navigator.serviceWorker.getRegistration().then(function(reg) {
      if (!reg) return;
      checkWaiting(reg);
      reg.update().then(function() { checkWaiting(reg); });
    });
  });
}
</script>
</head>
<body>
<div id="root"></div>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="react.min.js"></script>
<script src="react-dom.min.js"></script>
<script src="firebase-sdk.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<script src="firebase-messaging.js"></script>
<script src="firebase.js"></script>
<script src="dnd-hotel.js"></script>
<script src="bundle.min.js"></script>
</body>
</html>
