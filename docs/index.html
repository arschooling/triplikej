<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="여행"/>
<meta name="theme-color" content="#F5F2EC"/>
<link rel="manifest" href="manifest.json"/>
<title>Trip Like J</title>
<!-- 폰트 비차단 로드 -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
  onload="this.onload=null;this.rel='stylesheet'"/>
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"/></noscript>
<style>
  html, body { margin:0; padding:0; background:#F5F2EC; overflow-x:hidden; }
  #root { min-height:100%; background:#F5F2EC; }
  @keyframes ptr-spin  { to { transform:rotate(360deg); } }
  @keyframes splashIn  { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  @keyframes destSlide { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  @keyframes barGrow   { 0%{width:0%} 40%{width:55%} 70%{width:75%} 100%{width:88%} }
  @keyframes splashOut { to { opacity:0; } }
  @keyframes charPop {
    0%   { opacity:0; transform:translateY(52px) scale(0.55); }
    55%  { opacity:1; transform:translateY(-13px) scale(1.12); }
    75%  { transform:translateY(5px) scale(0.96); }
    90%  { transform:translateY(-3px) scale(1.02); }
    100% { opacity:1; transform:translateY(0) scale(1); }
  }
  /* 비행기: 활주로에서 천천히 출발 → 가속 → 이륙 → 아이콘 자리에서 멈춤 */
  @keyframes planeFly {
    0%   { transform:translateX(-310px) translateY(12px) rotate(22deg); opacity:1; }
    12%  { transform:translateX(-285px) translateY(12px) rotate(22deg); }
    30%  { transform:translateX(-220px) translateY(12px) rotate(22deg); }
    50%  { transform:translateX(-100px) translateY(12px) rotate(21deg); }
    62%  { transform:translateX(-18px)  translateY(12px) rotate(20deg); }
    74%  { transform:translateX(7px)    translateY(-5px)  rotate(-8deg); }
    86%  { transform:translateX(-1px)   translateY(-1px)  rotate(1deg); }
    93%  { transform:translateX(0)      translateY(0)     rotate(0deg); opacity:1; }
    100% { transform:translateX(0)      translateY(0)     rotate(0deg); opacity:0; }
  }
  /* 흰 비행기+땅선: 비행기 착지 후 나타남 */
  @keyframes planeFadeIn {
    from { opacity:0; }
    to   { opacity:1; }
  }
  /* 활주로: 비행기 이륙 후 아이콘 박스 뒤로 자연스럽게 줄어듦 */
  @keyframes runwayShrink {
    0%, 60% { transform:scaleX(1); }
    90%     { transform:scaleX(0.11); }
    100%    { transform:scaleX(0.01); }
  }
</style>
<!-- 서비스 워커 등록 (두 번째 방문부터 즉시 로드) -->
<script>
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</head>
<body>
<div id="root"></div>
<script src="react.min.js"></script>
<script src="react-dom.min.js"></script>
<script src="firebase-sdk.min.js"></script>
<script src="firebase.js"></script>
<script src="bundle.min.js"></script>
</body>
</html>
